<!DOCTYPE html>
<!-- saved from url=(0029)https://webmmd.pages.dev/ -->
<html lang="ja">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>webmmd</title>
  <meta name="theme-color" content="#0b1118">
  <link rel="icon" href="/webmmd/icons/icon-192.svg" type="image/svg+xml">
</head>

<body>
  <div id="app">
    <div class="app-shell">
      <aside class="sidebar">
        <div hidden>
          <header class="brand">
            <h1>webmmd</h1>
          </header>
          <input class="file-input" type="file" multiple />
          <span class="loaded-model-name"></span>
          <span class="pending-load pending-model-load" hidden></span>
          <span class="file-error file-error--model" hidden></span>
          <input class="motion-input" type="file" multiple />
          <span class="pending-load pending-motion-load" hidden></span>
          <span class="file-error file-error--motion" hidden></span>
          <input class="camera-motion-input" type="file" multiple />
          <span class="pending-load pending-camera-motion-load" hidden></span>
          <span class="file-error file-error--camera" hidden></span>
          <input class="scene-input" type="file" accept=".yml,.yaml" hidden />
        </div>
        <section class="panel" data-section-id="assets-path">
          <div class="panel-header">
            <h3>パス指定</h3>
            <span class="panel-toggle-icon">▼</span>
          </div>
          <div class="panel-content">
            <div class="panel-content-inner">
              <div class="field" id="assets-controls">
                <p id="assets-path-display" class="motion-empty" style="margin:0">現在のアセットパス：未設定</p>
                <button id="assets-open-button" type="button" class="action-button">アセットフォルダを設定・更新</button>
              </div>
            </div>
          </div>
        </section>
        <section class="panel" data-section-id="deployed-models">
          <div class="panel-header">
            <h3>配置済みモデル</h3>
            <span class="panel-toggle-icon">▼</span>
          </div>
          <div class="panel-content">
            <div class="panel-content-inner">
              <div class="field" id="deployed-models-wrap">
                <button id="add-model-window-button" type="button" class="action-button"
                  style="margin-bottom: 10px;">モデル追加</button>
                <div id="deployed-models-list" class="deployed-models-list"></div>
              </div>
            </div>
          </div>
        </section>
        <!-- assets-motions section was removed -->

        <section class="panel" id="scene-panel" data-section-id="scene">
          <div class="panel-header">
            <h3>シーン管理 (.yml)</h3>
            <span class="panel-toggle-icon">▼</span>
          </div>
          <div class="panel-content">
            <div class="panel-content-inner">
              <div class="scene-actions" style="display: flex; gap: 0.5em; margin-bottom: 0.5em;">
                <button id="scene-save-button" class="action-button" type="button">現在のシーンを保存</button>
                <button id="scene-load-button" class="action-button" type="button">シーンを読み込む</button>
              </div>
              <div id="saved-scenes-list" class="scene-list">
                <p class="motion-empty" style="margin:0">保存されたシーンはありません。</p>
              </div>
            </div>
          </div>
        </section>

        <section class="panel" data-section-id="settings-display">
          <div class="panel-header">
            <h3 class="settings-group__title">表示</h3>
            <span class="panel-toggle-icon">▼</span>
          </div>
          <div class="panel-content">
            <div class="panel-content-inner">
              <div class="settings-group">
                <label class="field">
                  <span>背景色</span>
                  <input class="color-input" type="color">
                </label>
                <label class="field">
                  <span>背景</span>
                  <select class="mode-select">
                    <option value="grid">グリッド</option>
                    <option value="solid">単色</option>
                  </select>
                </label>
                <label class="checkbox-field field--toggle">
                  <input class="shadow-toggle" type="checkbox">
                  <span>影</span>
                </label>
              </div>
            </div>
          </div>
        </section>
        <section class="panel" data-section-id="settings-physics">
          <div class="panel-header">
            <h3 class="settings-group__title">物理演算</h3>
            <span class="panel-toggle-icon">▼</span>
          </div>
          <div class="panel-content">
            <div class="panel-content-inner">
              <div class="settings-group">
                <label class="field">
                  <span>重力加速度 <span class="gravity-magnitude-value">9.8</span></span>
                  <input class="gravity-magnitude-input" type="range" min="0.1" max="50.0" step="0.1">
                </label>
                <hr style="border:0; border-top:1px solid #333; margin:0.8em 0;">
                <label class="checkbox-field field--toggle">
                  <input class="breast-physics-toggle" type="checkbox" checked>
                  <span>胸の物理揺れを有効化</span>
                </label>
                <label class="field" style="margin-top:0.8em;">
                  <span>胸の揺れ強度 <span class="breast-physics-stiffness-value">1.0</span></span>
                  <input class="breast-physics-stiffness-input" type="range" min="0.0" max="3.0" step="0.1" value="1.0">
                </label>
              </div>
            </div>
          </div>
        </section>
        <section class="panel" data-section-id="settings-vr">
          <div class="panel-header">
            <h3 class="settings-group__title">VR</h3>
            <span class="panel-toggle-icon">▼</span>
          </div>
          <div class="panel-content">
            <div class="panel-content-inner">
              <div class="settings-group">
                <label class="checkbox-field field--toggle">
                  <input class="vr-passthrough-toggle" type="checkbox">
                  <span>パススルーを有効化</span>
                </label>
              </div>
            </div>
          </div>
        </section>
        <section class="panel" data-section-id="settings-system">
          <div class="panel-header">
            <h3 class="settings-group__title">システム</h3>
            <span class="panel-toggle-icon">▼</span>
          </div>
          <div class="panel-content">
            <div class="panel-content-inner">
              <div class="settings-group">
                <label class="field">
                  <span>画質上限 (ピクセル比)</span>
                  <select class="pixel-ratio-select">
                    <option value="1">低画質 (1.0)</option>
                    <option value="1.5">中画質 (1.5)</option>
                    <option value="2">高画質 (2.0)</option>
                  </select>
                </label>
                <label class="field">
                  <span>シャドウ解像度</span>
                  <select class="shadow-resolution-select">
                    <option value="256">低 (256x256)</option>
                    <option value="512">中 (512x512)</option>
                    <option value="1024">高 (1024x1024)</option>
                  </select>
                </label>
                <button class="action-button clear-service-worker-button" type="button"
                  style="margin-top:0.5em;background:#666;color:#fff">
                  アプリのキャッシュを強制更新
                </button>
                <button class="action-button reset-user-data-button" type="button"
                  style="margin-top:0.5em;background:#b00020;color:#fff">
                  ユーザーデータをリセット
                </button>
              </div>
            </div>
          </div>
        </section>
        <section class="panel collapsed" data-section-id="console">
          <div class="panel-header">
            <h3 class="settings-group__title">コンソール</h3>
            <span class="panel-toggle-icon">▼</span>
          </div>
          <div class="panel-content">
            <div class="panel-content-inner">
              <div class="console-wrapper">
                <div class="console-actions">
                  <button id="console-clear-button" class="action-button" type="button" style="min-height: 28px; font-size: 12px; width: auto; padding: 0 12px;">クリア</button>
                  <button id="console-copy-button" class="action-button" type="button" style="min-height: 28px; font-size: 12px; width: auto; padding: 0 12px; margin-left: 4px;">全コピー</button>
                  <label class="checkbox-field field--toggle" style="margin: 0; font-size: 12px;">
                    <input id="console-autoscroll-toggle" type="checkbox" checked>
                    <span>自動スクロール</span>
                  </label>
                </div>
                <div id="console-log-container" class="console-log-container"></div>
              </div>
            </div>
          </div>
        </section>
      </aside>
      <main class="viewer" aria-label="PMX preview">
        <div class="viewer-loading">
          <div class="viewer-loading__spinner"></div>
          <span class="viewer-loading__text">読み込み中...</span>
        </div>
        <div class="viewer-overlay">
          <button class="overlay-button fullscreen-toggle" type="button" aria-label="全画面表示">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 3H3v5h2V5h3V3Zm8 0v2h3v3h2V3h-5ZM5 16H3v5h5v-2H5v-3Zm14 3h-3v2h5v-5h-2v3Z"></path>
            </svg>
          </button>
          <button class="overlay-button overlay-playback-toggle" type="button" aria-label="再生" disabled="">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 5v14l11-7L8 5Z"></path>
            </svg>
          </button>
          <button class="overlay-button overlay-reset-button" type="button" aria-label="リセット" disabled="">

            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5a7 7 0 1 1-6.32 4H3l4-4 4 4H8.05A5 5 0 1 0 12 7V5Z"></path>
            </svg>

          </button>
          <button class="overlay-button overlay-gyro-recalibrate-button" type="button" aria-label="視点リセット" disabled="">

            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 4a8 8 0 0 1 7.45 5.05l-1.86.74A6 6 0 1 0 12 18v-3l5 4-5 4v-3A8 8 0 1 1 12 4Z"></path>
              <path d="M11 11h2v2h-2v-2Z"></path>
            </svg>

          </button>
          <button class="overlay-button overlay-vr-button" id="overlay-vr-button" type="button" aria-label="VRモード"
            disabled="" title="WebXR確認中...">

            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M2 8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8Zm3 1a3 3 0 1 0 0 6 3 3 0 0 0 0-6Zm14 0a3 3 0 1 0 0 6 3 3 0 0 0 0-6ZM5 11a1 1 0 1 1 0 2 1 1 0 0 1 0-2Zm14 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2Zm-5 1a2 2 0 0 0-4 0h4Z" />
            </svg>

          </button>
        </div>
        <canvas id="renderCanvas" style="display: block; width: 100%; height: 100%; touch-action: none;"></canvas>
      </main>
    </div>
  </div>

  <input id="assets-directory-input" type="file" multiple hidden webkitdirectory directory>

  <!-- モデル選択モーダル -->
  <div id="model-select-modal" class="modal" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h3>モデルの選択と追加</h3>
        <button class="close-button" id="close-model-modal" aria-label="閉じる">&times;</button>
      </div>
      <div class="modal-body">
        <div id="modal-model-list" class="model-list">
          <p class="motion-empty">アセットフォルダを設定すると表示されます。</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ZIP内モデル選択モーダル -->
  <div id="zip-model-select-modal" class="modal" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h3>ZIP内のモデル選択</h3>
        <button class="close-button" id="close-zip-model-modal" aria-label="閉じる">&times;</button>
      </div>
      <div class="modal-body">
        <div id="modal-zip-model-list" class="model-list">
          <!-- 動的に.pmxファイル一覧が挿入されます -->
        </div>
      </div>
    </div>
  </div>

  <!-- モーション選択モーダル -->
  <div id="motion-select-modal" class="modal" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h3>モーションの選択と追加</h3>
        <button class="close-button" id="close-motion-modal" aria-label="閉じる">&times;</button>
      </div>
      <div class="modal-body">
        <div id="modal-motion-list" class="motion-list">
          <p class="motion-empty">アセットフォルダを設定すると表示されます。</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const clearSwBtn = document.querySelector(".clear-service-worker-button");
      clearSwBtn?.addEventListener("click", async () => {
        if (confirm("アプリのキャッシュを強制更新してリロードしますか？\n\n※アセットフォルダやシーンなどのユーザーデータは削除されません。")) {
          const spinner = document.querySelector(".viewer-loading");
          if (spinner) {
            spinner.removeAttribute("hidden");
            const spinnerText = spinner.querySelector(".viewer-loading__text");
            if (spinnerText) spinnerText.textContent = "キャッシュを強制クリア中...";
          }
          try {
            if ("serviceWorker" in navigator) {
              const registrations = await navigator.serviceWorker.getRegistrations();
              for (const registration of registrations) {
                await registration.unregister();
              }
            }
            if ("caches" in window) {
              const keys = await caches.keys();
              for (const key of keys) {
                await caches.delete(key);
              }
            }
            window.location.reload(true);
          } catch (err) {
            console.error("Failed to clear service worker:", err);
            alert("キャッシュのクリアに失敗しました: " + err.message);
            if (spinner) {
              spinner.setAttribute("hidden", "");
            }
          }
        }
      });
    });
  </script>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
